name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  SWR_REGION: cn-north-4
  SWR_ORG: ppy
  IMAGE_NAME: backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Login to Huawei Cloud SWR
      uses: huaweicloud/swr-login@v1
      with:
        region: ${{ env.SWR_REGION }}
        access-key-id: ${{ secrets.ACCESS_KEY }}
        access-key-secret: ${{ secrets.SECRET_KEY }}
    
    - name: Build Docker image
      run: |
        docker build -t swr.${{ env.SWR_REGION }}.myhuaweicloud.com/${{ env.SWR_ORG }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ./backend
        docker tag swr.${{ env.SWR_REGION }}.myhuaweicloud.com/${{ env.SWR_ORG }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                   swr.${{ env.SWR_REGION }}.myhuaweicloud.com/${{ env.SWR_ORG }}/${{ env.IMAGE_NAME }}:latest
    
    - name: Push to SWR
      run: |
        docker push swr.${{ env.SWR_REGION }}.myhuaweicloud.com/${{ env.SWR_ORG }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push swr.${{ env.SWR_REGION }}.myhuaweicloud.com/${{ env.SWR_ORG }}/${{ env.IMAGE_NAME }}:latest
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
    
    - name: Configure Kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
        echo "KUBECONFIG=$(pwd)/kubeconfig.yaml" >> $GITHUB_ENV
    
    - name: Update Deployment
      run: |
        kubectl set image deployment/backend backend=swr.${{ env.SWR_REGION }}.myhuaweicloud.com/${{ env.SWR_ORG }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n default
        kubectl rollout status deployment/backend -n default --timeout=120s