name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Login to Huawei Cloud SWR
      uses: huaweicloud/swr-login@v1
      with:
        region: cn-north-4
        access-key: ${{ secrets.ACCESS_KEY }}
        secret-key: ${{ secrets.SECRET_KEY }}
    
    - name: Build Docker image
      run: |
        docker build -t swr.cn-north-4.myhuaweicloud.com/ppy/backend:${{ github.sha }} ./backend
        docker tag swr.cn-north-4.myhuaweicloud.com/ppy/backend:${{ github.sha }} swr.cn-north-4.myhuaweicloud.com/ppy/backend:latest
    
    - name: Push to SWR
      run: |
        docker push swr.cn-north-4.myhuaweicloud.com/ppy/backend:${{ github.sha }}
        docker push swr.cn-north-4.myhuaweicloud.com/ppy/backend:latest
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
    
    - name: Configure Kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
        export KUBECONFIG=$(pwd)/kubeconfig.yaml
    
    - name: Update Deployment
      run: |
        kubectl set image deployment/backend backend=swr.cn-north-4.myhuaweicloud.com/ppy/backend:${{ github.sha }} -n default
        kubectl rollout status deployment/backend -n default --timeout=120s