apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: wordcount
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-north-4.myhuaweicloud.com/ppy/pyspark:v9
  mainApplicationFile: local:///opt/spark/work/wordcount.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: "1g"
    serviceAccount: spark
    coreRequest: "100m"
  executor:
    cores: 1
    instances: 2
    memory: "1g"
    coreRequest: "50m"