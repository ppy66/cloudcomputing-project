apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-redis-gateway
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-redis-gateway
  template:
    metadata:
      labels:
        app: mqtt-redis-gateway
    spec:
      containers:
      - name: gateway
        image: swr.cn-north-4.myhuaweicloud.com/ppy/mqtt-redis-gateway:v1
        env:
        - name: MQTT_HOST
          value: "mqtt-broker.mqtt.svc.cluster.local"
        - name: MQTT_PORT
          value: "1883"
        - name: REDIS_HOST
          value: "redis-svc.default.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          value: "redis2026"